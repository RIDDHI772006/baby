<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Baby Shower Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#080814;
  overflow-x:hidden;
  color:white;
}

/* BACKGROUND */

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top left,rgba(255,192,203,.18),transparent 30%),
  radial-gradient(circle at bottom right,rgba(135,206,250,.15),transparent 30%),
  radial-gradient(circle at center,rgba(255,255,255,.05),transparent 35%);
  z-index:-2;
}

/* PARTICLES */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
}

.particles span{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:white;
  opacity:.15;
  animation:float 15s linear infinite;
}

@keyframes float{
  0%{
    transform:translateY(100vh) scale(0);
  }
  100%{
    transform:translateY(-10vh) scale(1);
  }
}

/* HERO */

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:50px 8%;
}

.hero-content{
  max-width:850px;
}

.hero h1{
  font-size:70px;
  line-height:1.1;
  margin-bottom:20px;
  background:linear-gradient(45deg,#ffd6e7,#ffffff,#b5e4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#d4d4d4;
  font-size:18px;
  margin-bottom:35px;
}

.hero-btn{
  display:inline-block;
  padding:18px 42px;
  border-radius:60px;
  text-decoration:none;
  color:white;
  font-weight:600;
  background:linear-gradient(135deg,#ff7eb3,#7ecbff);
  transition:.4s;
}

.hero-btn:hover{
  transform:translateY(-5px) scale(1.05);
}

/* SECTION */

section{
  padding:110px 8%;
}

.section-title{
  text-align:center;
  margin-bottom:70px;
}

.small-title{
  color:#ffb8d2;
  letter-spacing:4px;
  font-size:13px;
}

.section-title h2{
  font-size:55px;
  margin-top:12px;
}

.section-title p{
  margin-top:15px;
  color:#cfcfcf;
}

/* GALLERY */

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.card{
  position:relative;
  overflow:hidden;
  border-radius:28px;
  height:360px;
  background:#111;
  transition:.35s;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.35);

  will-change:transform;
}

.card.large{
  grid-column:span 2;
  height:450px;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.8s;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.88),transparent);
  z-index:1;
}

.card:hover img{
  transform:translateY(-8px);
}

/* VIDEO */

.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:35px;
}

.video-card{
  position:relative;
  overflow:hidden;
  border-radius:30px;
  height:500px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);

  transform-style:preserve-3d;
}

.video-card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* DOWNLOAD BUTTON */

.download-btn{
  position:absolute;
  top:18px;
  right:18px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
  text-decoration:none;
  z-index:5;
  transition:.4s;
}

.download-btn:hover{
  transform:scale(1.1);
  background:linear-gradient(135deg,#ff7eb3,#7ecbff);
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:20px;
}

.modal.active{
  display:flex;
}

/* FOOTER */

footer{
  text-align:center;
  padding:40px 20px;
  color:#cfcfcf;
}

/* MOBILE */

@media(max-width:768px){

  .hero h1{
    font-size:45px;
  }

  .section-title h2{
    font-size:38px;
  }

  .card.large{
    grid-column:span 1;
    height:360px;
  }

  .video-card{
    height:400px;
  }

}

</style>
</head>
